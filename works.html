<body>
  <div id="works-root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="works/service.jsx"></script>
  <script type="text/babel" src="works/cases.jsx"></script>
  <script type="text/babel" src="works/news-contact.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "accent": "#E05720",
      "showStamp": true
    }/*EDITMODE-END*/;

    const Site = () => {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
      const [active, setActive] = React.useState('home');

      React.useEffect(() => {
        const root = document.querySelector('.w-root');
        if (root) {
          root.dataset.theme = tweaks.theme;
          root.style.setProperty('--w-accent', tweaks.accent);
        }
      }, [tweaks.theme, tweaks.accent]);

      React.useEffect(() => {
        const ids = ['home', 'about', 'highlights', 'service', 'case', 'news', 'contact'];
        const onScroll = () => {
          const y = window.scrollY + 120;
          let cur = 'home';
          for (const id of ids) {
            const el = document.getElementById('w-' + id);
            if (el && el.offsetTop <= y) cur = id;
          }
          setActive(cur);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const { WHeader, WHero, WAbout, WCompetencies, WClientsMarquee, WHighlights, WService, WCases, WNews, WContact, WFooter } = window;

      return (
        <div className="w-root" data-theme={tweaks.theme}>
          <WHeader active={active} setActive={setActive} />
          <WHero />
          <WAbout />
          <WCompetencies />
          <WClientsMarquee />
          <WHighlights />
          <WService />
          <WCases />
          <WNews />
          <WContact />
          <WFooter />

          <window.TweaksPanel title="Tweaks">
            <window.TweakSection title="主題">
              <window.TweakRadio
                label="色彩主題 / Theme"
                value={tweaks.theme}
                options={[
                  {value: 'dark',  label: '深色'},
                  {value: 'light', label: '淺色'},
                ]}
                onChange={v => setTweak('theme', v)}
              />
              <window.TweakColor
                label="強調色 / Accent"
                value={tweaks.accent}
                onChange={v => setTweak('accent', v)}
              />
            </window.TweakSection>
          </window.TweaksPanel>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('works-root')).render(<Site />);
  </script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Works/sw.js').catch(() => null)
      })
    }
  </script>

  <!-- Document-level event delegation (babel standalone loses JSX onClick handlers) -->
  <script>
  (function() {
    // Expose navigation handler (anchor scroll)
    window.__worksScrollTo = function(id) {
      const el = document.getElementById(id)
      if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'})
    }
    // Mobile menu toggle
    document.addEventListener('click', function(e) {
      const burger = e.target.closest('[data-menu-toggle]')
      if (burger) {
        const drawer = document.querySelector('[data-mobile-menu]')
        if (drawer) {
          const open = drawer.classList.toggle('open')
          document.body.style.overflow = open ? 'hidden' : ''
        }
      }
      const closeBtn = e.target.closest('[data-menu-close]')
      if (closeBtn) {
        const drawer = document.querySelector('[data-mobile-menu]')
        if (drawer) {
          drawer.classList.remove('open')
          document.body.style.overflow = ''
        }
      }
      // Mobile menu links
      const menuLink = e.target.closest('[data-menu-link]')
      if (menuLink) {
        const drawer = document.querySelector('[data-mobile-menu]')
        if (drawer) {
          drawer.classList.remove('open')
          document.body.style.overflow = ''
        }
        const target = menuLink.dataset.menuLink
        if (target) {
          e.preventDefault()
          setTimeout(() => window.__worksScrollTo(target), 100)
        }
      }
      // Case card → open modal
      const caseArt = e.target.closest('.w-case')
      if (caseArt) {
        const num = caseArt.dataset.num
        if (num && window.__worksOpenCaseModal) {
          e.preventDefault()
          window.__worksOpenCaseModal(num)
        }
      }
      // Modal close (backdrop or X)
      const modalClose = e.target.closest('[data-modal-close]')
      if (modalClose) {
        if (window.__worksCloseCaseModal) window.__worksCloseCaseModal()
      }
      // Click outside modal box
      if (e.target.classList && e.target.classList.contains('w-case-modal')) {
        if (window.__worksCloseCaseModal) window.__worksCloseCaseModal()
      }
      // ESC key
      if (e.key === 'Escape' && window.__worksCloseCaseModal) {
        window.__worksCloseCaseModal()
      }
      // Admin nav
      const adminLink = e.target.closest('[data-admin-link]')
      if (adminLink) {
        e.preventDefault()
        window.location.href = adminLink.getAttribute('href')
      }
      // Hero CTA
      const ctaBtn = e.target.closest('[data-cta-scroll]')
      if (ctaBtn) {
        const target = ctaBtn.dataset.ctaScroll
        if (target) {
          e.preventDefault()
          window.__worksScrollTo(target)
        }
      }
      // Case filter
      const filterBtn = e.target.closest('.w-case-filter')
      if (filterBtn && window.__worksSetCaseFilter) {
        const cat = filterBtn.textContent.trim()
        window.__worksSetCaseFilter(cat)
      }
    })
  })();
  </script>
