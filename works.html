<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>WORKS 沃克思國際 — 活動企劃 / 視覺設計 / 整合行銷</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="works/site.css" />
  <style>
    html, body { height: 100%; }
    body { background: #000000; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="works-root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="works/data.jsx"></script>
  <script type="text/babel" src="works/header.jsx"></script>
  <script type="text/babel" src="works/hero.jsx"></script>
  <script type="text/babel" src="works/about.jsx"></script>
  <script type="text/babel" src="works/highlights.jsx"></script>
  <script type="text/babel" src="works/service.jsx"></script>
  <script type="text/babel" src="works/cases.jsx"></script>
  <script type="text/babel" src="works/news-contact.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "accent": "#E05720",
      "showStamp": true
    }/*EDITMODE-END*/;

    const Site = () => {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
      const [active, setActive] = React.useState('home');

      React.useEffect(() => {
        const root = document.querySelector('.w-root');
        if (root) {
          root.dataset.theme = tweaks.theme;
          root.style.setProperty('--w-accent', tweaks.accent);
        }
      }, [tweaks.theme, tweaks.accent]);

      React.useEffect(() => {
        const ids = ['home', 'about', 'highlights', 'service', 'case', 'news', 'contact'];
        const onScroll = () => {
          const y = window.scrollY + 120;
          let cur = 'home';
          for (const id of ids) {
            const el = document.getElementById('w-' + id);
            if (el && el.offsetTop <= y) cur = id;
          }
          setActive(cur);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const { WHeader, WHero, WAbout, WCompetencies, WClientsMarquee, WHighlights, WService, WCases, WNews, WContact, WFooter } = window;

      return (
        <div className="w-root" data-theme={tweaks.theme}>
          <WHeader active={active} setActive={setActive} />
          <WHero />
          <WAbout />
          <WCompetencies />
          <WClientsMarquee />
          <WHighlights />
          <WService />
          <WCases />
          <WNews />
          <WContact />
          <WFooter />

          <window.TweaksPanel title="Tweaks">
            <window.TweakSection title="主題">
              <window.TweakRadio
                label="色彩主題 / Theme"
                value={tweaks.theme}
                options={[
                  {value: 'dark',  label: '深色'},
                  {value: 'light', label: '淺色'},
                ]}
                onChange={v => setTweak('theme', v)}
              />
              <window.TweakColor
                label="強調色 / Accent"
                value={tweaks.accent}
                onChange={v => setTweak('accent', v)}
              />
            </window.TweakSection>
          </window.TweaksPanel>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('works-root')).render(<Site />);
  </script>
</body>
</html>
